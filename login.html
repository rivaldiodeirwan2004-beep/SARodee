<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - SARodee AI POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { primary: '#714B67', dark: '#017E84', bg: '#F9F9F9' } } } }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen flex flex-col justify-between font-sans text-slate-800">
    <div class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-lg shadow-sm border border-slate-200 p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-brand-primary tracking-tight">SARodee<span class="text-brand-dark">.ai</span></h1>
                <p class="text-sm text-slate-500 mt-1">Smart AI Point of Sale Platform</p>
            </div>
            <form onsubmit="event.preventDefault(); window.location.href='apps.html';" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" required placeholder="admin@sarodee.com" class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-brand-primary transition">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-slate-700">Kata Sandi</label>
                    </div>
                    <input type="password" required placeholder="••••••••" class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-brand-primary transition">
                </div>
                <button type="submit" class="w-full bg-brand-primary hover:bg-opacity-90 text-white font-medium py-2 px-4 rounded transition shadow-sm text-sm">
                    Masuk
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-slate-600 border-t border-slate-100 pt-4">
                Belum punya akun? <a href="register.html" class="text-brand-dark font-semibold hover:underline">Daftar Gratis</a>
            </div>
        </div>
    </div>
    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-200 bg-white">
        Powered by <span class="font-semibold text-brand-primary">SARodee AI</span>
    </footer>
</body>
</html>
