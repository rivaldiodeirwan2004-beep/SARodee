<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - SARodee AI POS</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#714B67', // Warna ungu khas Odoo yang elegan
                            dark: '#017E84',    // Warna teal aksen Odoo
                            bg: '#F9F9F9'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen flex flex-col justify-between font-sans text-slate-800">

    <!-- Konten Utama -->
    <div class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-lg shadow-sm border border-slate-200 p-8">
            
            <!-- Logo SARodee -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-brand-primary tracking-tight">SARodee<span class="text-brand-dark">.ai</span></h1>
                <p class="text-sm text-slate-500 mt-1">Smart AI Point of Sale Platform</p>
            </div>

            <!-- Form Login -->
            <form action="apps.html" method="GET" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" required placeholder="nama@toko.com"
                        class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-brand-primary focus:border-brand-primary transition">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="block text-sm font-medium text-slate-700">Kata Sandi</label>
                        <a href="#" class="text-xs text-brand-primary hover:underline">Lupa Password?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-brand-primary focus:border-brand-primary transition">
                </div>

                <!-- Tombol Masuk (Di-link-kan ke halaman apps.html untuk simulasi) -->
                <button type="submit" 
                    class="w-full bg-brand-primary hover:bg-opacity-90 text-white font-medium py-2 px-4 rounded transition shadow-sm text-sm">
                    Masuk
                </button>
            </form>

            <!-- Registrasi Tautan -->
            <div class="mt-6 text-center text-sm text-slate-600 border-t border-slate-100 pt-4">
                Belum punya akun? <a href="register.html" class="text-brand-dark font-semibold hover:underline">Daftar Gratis</a>
            </div>

        </div>
    </div>

    <!-- Kaki Halaman (Footer ala Odoo) -->
    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-200 bg-white">
        Powered by <span class="font-semibold text-brand-primary">SARodee AI</span>. Bersama UMKM Indonesia maju.
    </footer>

</body>
</html>
