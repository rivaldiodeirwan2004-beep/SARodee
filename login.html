<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SARodee POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ambil pustaka Supabase resmi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        odoo: { purple: '#714B67', dark: '#1E293B', grayBg: '#F3F4F6' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-odoo-grayBg h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <!-- Logo / Judul -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-odoo-purple tracking-tight">SARodee</h1>
            <p class="text-sm text-slate-500 mt-2">Point of Sale & Management System</p>
        </div>

        <!-- Form Login -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Email Pengguna</label>
                <input type="email" id="email" required placeholder="nama@toko.com" 
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:bg-white focus:ring-2 focus:ring-odoo-purple/20 focus:border-odoo-purple transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Kata Sandi</label>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:bg-white focus:ring-2 focus:ring-odoo-purple/20 focus:border-odoo-purple transition">
            </div>

            <div class="text-right">
                <a href="#" onclick="alert('Silakan hubungi administrator utama untuk reset sandi.')" class="text-xs text-odoo-purple hover:underline font-medium">Lupa kata sandi?</a>
            </div>

            <!-- Tombol Masuk Utama (Hubungkan ke Supabase) -->
            <button type="submit" id="btn-login"
                class="w-full bg-odoo-purple hover:bg-opacity-95 text-white font-bold py-3 rounded-lg text-sm shadow transition">
                Masuk Sistem
            </button>
        </form>

        <div class="relative my-6 flex items-center justify-center">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
            <span class="relative bg-white px-3 text-xs text-slate-400 font-medium uppercase">Atau Akses Cepat</span>
        </div>

        <!-- TOMBOL MASUK GRATIS (DEMO MODE / BYPASS) -->
        <!-- Tombol ini sengaja dibuat agar Anda bisa langsung masuk ke aplikasi tanpa perlu mendaftarkan email terlebih dahulu -->
        <button onclick="loginGratis()" 
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg text-sm shadow transition flex items-center justify-center gap-2">
            ⚡ Masuk Instan (Mode Demo)
        </button>
    </div>

    <script>
        // Kredensial Proyek Supabase Cloud Anda
        const SUPABASE_URL = "https://taxvlatlimjzidgrfvzc.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRheHZsYXRsaW1qemlkZ3JmdnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTQwMzEsImV4cCI6MjA5NTI5MDAzMX0.83LI07DeoVa3HA9uQL7LCut-aY-b1SjWKUV70meQTpQ";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi 1: Login Resmi via Supabase Auth
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');

            btn.innerText = "Memeriksa...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                // Jika sukses, simpan status login lalu lempar ke halaman menu utama (apps.html)
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = "apps.html";

            } catch (error) {
                alert("Gagal Masuk: " + error.message + "\n\nTip: Jika belum mendaftarkan email di Supabase Auth, silakan gunakan tombol 'Masuk Instan' di bawah.");
                btn.innerText = "Masuk Sistem";
                btn.disabled = false;
            }
        }

        // Fungsi 2: Masuk Gratis / Bypass Tanpa Email
        function loginGratis() {
            // Kita set penanda di memori browser bahwa pengguna ini sudah diizinkan masuk
            localStorage.setItem('isLoggedIn', 'true');
            // Alihkan langsung ke halaman menu utama
            window.location.href = "apps.html";
        }
    </script>
</body>
</html>
