<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Saya - SARodee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#714B67',
                            dark: '#017E84',
                            bg: '#4A3244' // Latar belakang gelap ungu khas Odoo Dashboard
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen text-white font-sans flex flex-col justify-between">

    <!-- Bagian Atas / Pencarian -->
    <header class="p-6 max-w-4xl mx-auto w-full text-center mt-12">
        <h2 class="text-2xl font-light mb-6 text-slate-200">Pilih Aplikasi <span class="font-bold text-white">SARodee</span> Anda</h2>
        <div class="max-w-md mx-auto relative">
            <input type="text" placeholder="Cari aplikasi..." 
                class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-full py-2 px-5 text-white placeholder-slate-400 focus:outline-none focus:bg-white focus:text-slate-800 focus:placeholder-slate-400 transition text-center text-sm">
        </div>
    </header>

    <!-- Grid Menu Utama Ala Odoo -->
    <main class="max-w-4xl mx-auto w-full p-6 flex-grow flex items-center justify-center">
        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-8 text-center w-full">
            
            <!-- App 1: Point of Sale (Kasir) -->
            <a href="dashboard/kasir.html" class="group flex flex-col items-center">
                <div class="w-16 h-16 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                    <!-- Ikon Monitor/Kasir -->
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-xs font-medium text-slate-200 group-hover:text-white transition">Point of Sale</span>
            </a>

            <!-- App 2: Inventaris (Stok) -->
            <a href="#" class="group flex flex-col items-center opacity-70 hover:opacity-100">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                    <!-- Ikon Box -->
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                </div>
                <span class="text-xs font-medium text-slate-200 group-hover:text-white transition">Stok Barang</span>
            </a>

            <!-- App 3: Karyawan -->
            <a href="#" class="group flex flex-col items-center opacity-70 hover:opacity-100">
                <div class="w-16 h-16 bg-gradient-to-br from-teal-400 to-emerald-500 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                    <!-- Ikon Users -->
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0-6a3 3 0 100-6 3 3 0 000 6zm5 6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <span class="text-xs font-medium text-slate-200 group-hover:text-white transition">Karyawan</span>
            </a>

            <!-- App 4: Finansial / AI Report -->
            <a href="#" class="group flex flex-col items-center opacity-70 hover:opacity-100">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                    <!-- Ikon Chart -->
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h2a2 2 0 002-2zm12-5a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <span class="text-xs font-medium text-slate-200 group-hover:text-white transition">Laporan AI</span>
            </a>

            <!-- App 5: Pengaturan Sisteem -->
            <a href="#" class="group flex flex-col items-center opacity-50 hover:opacity-100">
                <div class="w-16 h-16 bg-gradient-to-br from-gray-500 to-slate-600 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                    <!-- Ikon Gear -->
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <span class="text-xs font-medium text-slate-300 group-hover:text-white transition">Pengaturan</span>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="p-6 text-center text-xs text-slate-400">
        SARodee OS v1.0 • Tekan <kbd class="bg-white bg-opacity-20 px-1.5 py-0.5 rounded text-[10px]">Esc</kbd> untuk kembali ke Landing Page.
    </footer>

</body>
</html>
