<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Saya - SARodee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { primary: '#714B67', dark: '#017E84', bg: '#4A3244' } } } }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen text-white font-sans flex flex-col justify-between">
    <header class="p-6 max-w-4xl mx-auto w-full text-center mt-12">
        <h2 class="text-2xl font-light mb-6 text-slate-200">Pilih Aplikasi <span class="font-bold text-white">SARodee</span> Anda</h2>
    </header>

    <main class="max-w-4xl mx-auto p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 text-center flex-grow w-full">
        <a href="pos.html" class="group flex flex-col items-center">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                <span class="text-2xl">🛒</span>
            </div>
            <span class="text-sm font-medium text-slate-200 group-hover:text-white transition">Point of Sale</span>
        </a>

        <a href="inventaris.html" class="group flex flex-col items-center">
            <div class="w-16 h-16 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-105 transition mb-2">
                <span class="text-2xl">📦</span>
            </div>
            <span class="text-sm font-medium text-slate-200 group-hover:text-white transition">Stok & Inventaris</span>
        </a>
    </main>
</body>
</html>
