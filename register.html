<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Gratis - SARodee AI POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { primary: '#714B67', dark: '#017E84', bg: '#F9F9F9' } } } }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen flex flex-col justify-between font-sans text-slate-800">
    <div class="flex-grow flex items-center justify-center p-4 my-8">
        <div class="w-full max-w-md bg-white rounded-lg shadow-sm border border-slate-200 p-8">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-brand-primary tracking-tight">SARodee<span class="text-brand-dark">.ai</span></h1>
                <p class="text-sm text-slate-500 mt-1">Mulai modernisasi bisnis Anda hari ini</p>
            </div>
            <form onsubmit="event.preventDefault(); alert('Pendaftaran Berhasil (Simulasi)!'); window.location.href='apps.html';" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Pemilik</label>
                    <input type="text" required class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 transition text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Bisnis / Toko</label>
                    <input type="text" required class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 transition text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Bisnis</label>
                    <input type="email" required class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 transition text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Kata Sandi</label>
                    <input type="password" required placeholder="Minimal 8 karakter" class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-1 transition text-sm">
                </div>
                <button type="submit" class="w-full bg-brand-primary hover:bg-opacity-90 text-white font-medium py-2 px-4 rounded transition shadow-sm text-sm mt-2">
                    Buat Akun & Mulai Uji Coba Gratis
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-slate-600 border-t border-slate-100 pt-4">
                Sudah punya akun? <a href="login.html" class="text-brand-primary font-semibold hover:underline">Masuk Sekarang</a>
            </div>
        </div>
    </div>
</body>
</html>
