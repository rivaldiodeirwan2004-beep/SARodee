<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point of Sale - SARodee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { odoo: { purple: '#714B67', dark: '#1E293B', grayBg: '#F3F4F6', greenPay: '#017E84' } } } }
        }
    </script>
</head>
<body class="bg-odoo-grayBg h-screen flex flex-col font-sans text-slate-800 overflow-hidden">

    <header class="bg-odoo-purple text-white h-12 flex items-center justify-between px-4 shadow-md flex-shrink-0">
        <div class="flex items-center gap-4">
            <a href="apps.html" class="hover:bg-white/10 p-1.5 rounded transition" title="Kembali ke Menu Utama">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </a>
            <h1 class="font-bold text-sm tracking-wide">SARodee <span class="font-normal opacity-80">| Point of Sale</span></h1>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-[400px] bg-white border-r border-slate-200 flex flex-col justify-between flex-shrink-0">
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="cart-container">
                <div id="empty-cart-msg" class="text-center text-slate-400 py-12 text-sm">Keranjang kosong.</div>
            </div>
            <div class="border-t border-slate-200 p-4 bg-slate-50 space-y-4">
                <div class="flex justify-between text-lg font-bold">
                    <span>Total Akhir (Termasuk Pajak 10%)</span>
                    <span class="text-odoo-purple" id="summary-total">Rp0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-odoo-greenPay text-white font-bold py-4 rounded-xl shadow transition text-center">
                    Bayar & Potong Stok Cloud (<span id="btn-total-pay">Rp0</span>)
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="bg-white border-b border-slate-200 p-4">
                <input type="text" id="search-input" oninput="searchProduct()" placeholder="Cari nama produk..." class="w-72 bg-slate-100 border rounded px-3 py-2 text-sm focus:outline-none">
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="product-grid"></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://taxvlatlimjzidgrfvzc.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRheHZsYXRsaW1qemlkZ3JmdnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTQwMzEsImV4cCI6MjA5NTI5MDAzMX0.83LI07DeoVa3HA9uQL7LCut-aY-b1SjWKUV70meQTpQ";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = []; let cart = [];

        async function fetchProductsFromDatabase() {
            try {
                let { data, error } = await supabase.from('products').select('*');
                if (error) throw error;
                products = data.map(item => ({
                    id: item.id,
                    name: item.name || item.nama_produk || "Produk",
                    price: Number(item.price || item.harga || 0),
                    stock: Number(item.stock || item.stok || 0),
                    icon: item.icon || '📦',
                    category: item.category || 'Umum'
                }));
                renderProducts();
            } catch (error) {
                document.getElementById('product-grid').innerHTML = `<div class="text-red-500">Gagal memuat: ${error.message}</div>`;
            }
        }

        function renderProducts(filteredProducts = products) {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            filteredProducts.forEach(prod => {
                grid.innerHTML += `
                    <button onclick="addToCart(${prod.id})" class="bg-white border p-3 rounded-xl text-left flex flex-col justify-between hover:shadow transition">
                        <div class="text-3xl mb-2">${prod.icon}</div>
                        <h3 class="font-bold text-sm text-slate-800">${prod.name}</h3>
                        <div class="mt-4 flex justify-between w-full text-xs">
                            <span class="text-emerald-600">Stok: ${prod.stock}</span>
                            <span class="font-bold text-odoo-purple">Rp${prod.price.toLocaleString('id-ID')}</span>
                        </div>
                    </button>`;
            });
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            const exist = cart.find(c => c.id === id);
            if (exist) { if (exist.qty < prod.stock) exist.qty++; else return alert('Stok habis!'); }
            else { if (prod.stock > 0) cart.push({ ...prod, qty: 1 }); else return alert('Stok habis!'); }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-container');
            if (cart.length === 0) { container.innerHTML = 'Keranjang kosong.'; document.getElementById('summary-total').innerText = 'Rp0'; document.getElementById('btn-total-pay').innerText = 'Rp0'; return; }
            container.innerHTML = ''; let subtotal = 0;
            cart.forEach(item => {
                subtotal += item.price * item.qty;
                container.innerHTML += `<div class="p-2 bg-slate-50 border rounded mb-1 flex justify-between">
                    <div><b>${item.name}</b> x${item.qty}</div>
                    <div>Rp${(item.price * item.qty).toLocaleString('id-ID')}</div>
                </div>`;
            });
            let total = subtotal + (subtotal * 0.1);
            document.getElementById('summary-total').innerText = `Rp${total.toLocaleString('id-ID')}`;
            document.getElementById('btn-total-pay').innerText = `Rp${total.toLocaleString('id-ID')}`;
        }

        async function checkout() {
            if (cart.length === 0) return alert('Keranjang kosong!');
            try {
                for (let item of cart) {
                    await supabase.from('products').update({ stock: item.stock - item.qty }).eq('id', item.id);
                }
                alert('🎉 Transaksi Berhasil! Stok database cloud Supabase terpotong.');
                cart = []; updateCart(); fetchProductsFromDatabase();
            } catch (e) { alert('Gagal: ' + e.message); }
        }

        function searchProduct() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
        }

        fetchProductsFromDatabase();
    </script>
</body>
</html>
